<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公共 -学年末-</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --warning: #f59e0b;
            --error: #dc2626;
            --bg: #f3f4f6;
            --card: #ffffff;
            --text: #1f2937;
            --link: #7c3aed;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card);
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 680px;
            padding: 40px;
            text-align: center;
        }

        h1 { font-size: 1.6rem; margin-bottom: 5px; color: var(--primary); }
        .subtitle { font-size: 0.85rem; color: #6b7280; margin-bottom: 20px; }

        .range-selector {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
        }
        .range-selector h3 { font-size: 0.9rem; margin-top: 0; margin-bottom: 10px; color: #374151; }
        .checkbox-group { display: flex; flex-direction: column; gap: 8px; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; font-size: 0.95rem; cursor: pointer; }

        .mode-select { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
        .mode-btn {
            background-color: #fff; border: 2px solid var(--primary); color: var(--primary);
            padding: 12px; border-radius: 8px; font-size: 0.9rem; font-weight: bold; cursor: pointer; transition: 0.2s;
            text-decoration: none; display: flex; align-items: center; justify-content: center;
        }
        .mode-btn:hover { background-color: var(--primary); color: #fff; }

        .link-btn { border-color: var(--link); color: var(--link); margin-top: 20px; width: 100%; }
        .link-btn:hover { background-color: var(--link); color: #fff; }

        .option-label { cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px; background: #eff6ff; border-radius: 20px; border: 1px solid #bfdbfe; margin-bottom: 20px; font-size: 0.85rem; }

        .screen { display: none; }
        .screen.active { display: block; }

        .progress { font-size: 0.85rem; color: #6b7280; margin-bottom: 15px; font-weight: bold; }
        .question-box { font-size: 1.05rem; font-weight: bold; margin-bottom: 25px; line-height: 1.6; min-height: 100px; display: flex; align-items: center; justify-content: center; background: #f9fafb; padding: 20px; border-radius: 8px; border: 1px solid #e5e7eb; }

        /* フラッシュカード用フォント設定 */
        .fc-large { font-size: 1.6rem; font-weight: bold; color: var(--primary); }
        .fc-medium { font-size: 1.0rem; line-height: 1.6; color: var(--text); font-weight: normal; }

        .options-grid { display: grid; gap: 10px; grid-template-columns: 1fr; }
        button.option-btn { background: #fff; border: 2px solid #e5e7eb; border-radius: 8px; padding: 14px; font-size: 0.95rem; cursor: pointer; text-align: left; width: 100%; }
        button.option-btn.correct { background-color: #dcfce7; border-color: var(--success); color: var(--success); font-weight: bold; }
        button.option-btn.wrong { background-color: #fee2e2; border-color: var(--error); color: var(--error); }

        .input-area { display: flex; flex-direction: column; gap: 15px; }
        input[type="text"] { padding: 15px; font-size: 1.2rem; border: 2px solid #e5e7eb; border-radius: 8px; text-align: center; width: 100%; box-sizing: border-box; }
        .submit-btn { background-color: var(--primary); color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .flashcard-container { width: 100%; height: 260px; perspective: 1000px; cursor: pointer; margin-bottom: 20px; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0s; }
        .flashcard-container.flipped .flashcard-inner { transform: rotateY(180deg); }
        .flashcard-front, .flashcard-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 12px; padding: 25px; box-sizing: border-box; border: 2px solid #e5e7eb; }
        .flashcard-front { background-color: #fff; }
        .flashcard-back { background-color: #f0fdf4; transform: rotateY(180deg); border-color: var(--success); }

        .fc-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .fc-btn { padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; }
        .fc-btn-ok { background-color: var(--success); }
        .fc-btn-ng { background-color: #ef4444; }

        .feedback-msg { margin-top: 15px; padding: 15px; border-radius: 8px; font-weight: bold; display: none; }
        .feedback-msg.correct { background-color: #dcfce7; color: var(--success); }
        .feedback-msg.wrong { background-color: #fee2e2; color: var(--error); }
        .next-btn { background-color: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen" class="screen active">
        <h1>公共 重要用語マスター</h1>
        <p class="subtitle">高2 学年末版</p>

        <div class="range-selector">
            <h3>出題範囲を選択：</h3>
            <div class="checkbox-group">
                <label class="checkbox-item"><input type="checkbox" class="range-chk" value="小テスト" checked> 小テスト</label>
                <label class="checkbox-item"><input type="checkbox" class="range-chk" value="順当マイノート" checked> 順当マイノート</label>
                <label class="checkbox-item"><input type="checkbox" class="range-chk" value="重箱の隅をほじくる" checked> 重箱の隅をほじくる</label>
            </div>
        </div>

        <label class="option-label">
            <input type="checkbox" id="reverse-mode-chk"> 🔄 意味から用語を答える
        </label>
        
        <div class="mode-select">
            <button class="mode-btn" onclick="startGame('flashcard')">カード</button>
            <button class="mode-btn" onclick="startGame('choice')">4択</button>
            <button class="mode-btn" onclick="startGame('input')">記述</button>
        </div>

        <a href="https://sithigh21147.github.io/chemoti/" class="mode-btn link-btn">化学はこちら</a>
    </div>

    <div id="main-screen" class="screen">
        <div class="progress" id="progress-text"></div>
        <div id="question-area"><div class="question-box" id="question-text"></div></div>

        <div id="flashcard-area" style="display:none;">
            <div class="flashcard-container" id="flashcard-container" onclick="flipCard()">
                <div class="flashcard-inner">
                    <div class="flashcard-front"><div id="fc-front-content"></div></div>
                    <div class="flashcard-back"><div id="fc-back-content"></div></div>
                </div>
            </div>
            <div class="fc-controls">
                <button class="fc-btn fc-btn-ng" onclick="markFlashcard(false)">× 苦手</button>
                <button class="fc-btn fc-btn-ok" onclick="markFlashcard(true)">○ 覚えた</button>
            </div>
        </div>

        <div id="options-area" class="options-grid" style="display:none;"></div>
        <div id="input-area" class="input-area" style="display:none;">
            <input type="text" id="answer-input" placeholder="解答を入力" autocomplete="off">
            <button class="submit-btn" onclick="checkInputAnswer()">回答</button>
        </div>

        <div id="feedback-msg" class="feedback-msg"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()" style="display:none">次へ</button>
    </div>

    <div id="result-screen" class="screen">
        <h1>全問終了！</h1>
        <p>学習お疲れ様でした。</p>
        <button class="next-btn" onclick="location.reload()">トップに戻る</button>
    </div>
</div>

        { cat: "重箱の隅をほじくる", group: "F", term: "4分の1", desc: "衆参いずれかの総議員のこれだけの要求で臨時国会を召集できる。" },
        { cat: "重箱の隅をほじくる", group: "F", term: "3分の2", desc: "衆議院で否決された法律案を再可決するのに必要な出席議員の割合。" },
        { cat: "重箱の隅をほじくる", group: "F", term: "7割", desc: "日本の地方公共団体の歳入のうち、国への依存財源がおよそ何割と言われるか。" },
        { cat: "重箱の隅をほじくる", group: "F", term: "4割", desc: "日本の地方公共団体の歳入のうち、地方税などの自主財源がおよそ何割と言われるか。" },
        { cat: "重箱の隅をほじくる", group: "C", term: "天下り", desc: "高級官僚が退官後に、関連企業の役員として再就職すること。" },
        { cat: "重箱の隅をほじくる", group: "C", term: "知的財産高等裁判所", desc: "知的財産権に関する訴訟を専門に扱う、東京高等裁判所の支部。" },
        { cat: "重箱の隅をほじくる", group: "C", term: "憲法の番人", desc: "最高裁判所は違憲審査を最終的に確定することからついた呼ばれかた。" },
        { cat: "重箱の隅をほじくる", group: "C", term: "少年事件", desc: "20歳未満で罪を犯した者などの事件。" },
        { cat: "重箱の隅をほじくる", group: "C", term: "保護主義", desc: "処罰よりも更生させることを重視する主義。" },
        { cat: "重箱の隅をほじくる", group: "C", term: "ブライス (イギリスの政治家)", desc: "地方自治を「民主主義の学校」という言葉にした人。" },
        { cat: "重箱の隅をほじくる", group: "C", term: "国庫支出金", desc: "公共事業などの事務に要する経費を国が支出するもの。" },
        { cat: "重箱の隅をほじくる", group: "C", term: "財政再生団体", desc: "総務省指導の下に財政再建計画を作成し、再建を図る団体。" },
        { cat: "重箱の隅をほじくる", group: "C", term: "三割自治 (四割自治)", desc: "自主財源の占める割合が低く、国に依存している状況の呼び名。" },
        { cat: "重箱の隅をほじくる", group: "B", term: "金権政治", desc: "金の力で政治を動かそうとする、不祥事の絶えなかった時代の政治。" },
        { cat: "重箱の隅をほじくる", group: "B", term: "55年体制", desc: "社会党再統一、自民党誕生、自民党政権維持の過去の体制。" },
        { cat: "重箱の隅をほじくる", group: "B", term: "細川内閣", desc: "1993年の非自民連立政権。「○○内閣」" },

        /* === グループ別ダミー選択肢 (6個以上ずつ) === */
        { group: "A", term: "特別警備隊", isDistractor: true }, { group: "A", term: "近衛兵", isDistractor: true }, { group: "A", term: "沿岸警備隊", isDistractor: true }, { group: "A", term: "軍政分離原則", isDistractor: true }, { group: "A", term: "国家防衛局", isDistractor: true }, { group: "A", term: "治安維持軍", isDistractor: true },
        { group: "B", term: "平和維持条約", isDistractor: true }, { group: "B", term: "日米安全保障協力法", isDistractor: true }, { group: "B", term: "非軍事協力原則", isDistractor: true }, { group: "B", term: "重要拠点保護法", isDistractor: true }, { group: "B", term: "広域安保宣言", isDistractor: true }, { group: "B", term: "国際平和維持軍", isDistractor: true }, { group: "B", term: "政党寄付金禁止法", isDistractor: true },
        { group: "C", term: "内閣総理協議会", isDistractor: true }, { group: "C", term: "裁判官罷免審判", isDistractor: true }, { group: "C", term: "行政監視委員会", isDistractor: true }, { group: "C", term: "不逮捕責任", isDistractor: true }, { group: "C", term: "法律改正権", isDistractor: true }, { group: "C", term: "住民自治法", isDistractor: true }, { group: "C", term: "起訴免除制度", isDistractor: true },
        { group: "D", term: "中選挙区比例代表制", isDistractor: true }, { group: "D", term: "単記名投票制", isDistractor: true }, { group: "D", term: "比例代表並立連用制", isDistractor: true }, { group: "D", term: "足切り投票制", isDistractor: true }, { group: "D", term: "政党名簿拘束式", isDistractor: true }, { group: "D", term: "小選挙区単記制", isDistractor: true },
        { group: "E", term: "ボルダ式", isDistractor: true }, { group: "E", term: "コンドルセ式", isDistractor: true }, { group: "E", term: "フィボナッチ式", isDistractor: true }, { group: "E", term: "サント=ラゲ式", isDistractor: true }, { group: "E", term: "自然数割振式", isDistractor: true }, { group: "E", term: "単純多数決式", isDistractor: true },
        { group: "F", term: "3分の1", isDistractor: true }, { group: "F", term: "4分の3", isDistractor: true }, { group: "F", term: "5分の2", isDistractor: true }, { group: "F", term: "9割", isDistractor: true }, { group: "F", term: "半数", isDistractor: true }, { group: "F", term: "3割", isDistractor: true }, { group: "F", term: "5分の3", isDistractor: true }
    ];

    let currentQueue = [];
    let retryQueue = [];
    let currentIndex = 0;
    let currentMode = 'choice';
    let isReverseMode = false;

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function startGame(mode) {
        currentMode = mode;
        isReverseMode = document.getElementById('reverse-mode-chk').checked;
        const selectedCats = Array.from(document.querySelectorAll('.range-chk:checked')).map(cb => cb.value);
        if (selectedCats.length === 0) { alert("出題範囲を選んでください"); return; }

        const tasks = quizData.filter(q => selectedCats.includes(q.cat) && q.desc);
        currentQueue = shuffle([...tasks]);
        currentIndex = 0;
        retryQueue = [];
        
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('main-screen').classList.add('active');
        updateUI();
        loadNext();
    }

    function updateUI() {
        document.getElementById('question-area').style.display = (currentMode === 'flashcard') ? 'none' : 'block';
        document.getElementById('flashcard-area').style.display = (currentMode === 'flashcard') ? 'block' : 'none';
        document.getElementById('options-area').style.display = (currentMode === 'choice') ? 'grid' : 'none';
        document.getElementById('input-area').style.display = (currentMode === 'input') ? 'flex' : 'none';
    }

    function loadNext() {
        if (currentIndex >= currentQueue.length) {
            if (retryQueue.length > 0 && currentMode !== 'choice') {
                currentQueue = shuffle([...retryQueue]);
                retryQueue = []; currentIndex = 0;
                alert("リトライを開始します！");
            } else {
                document.getElementById('main-screen').classList.remove('active');
                document.getElementById('result-screen').classList.add('active');
                return;
            }
        }

        const data = currentQueue[currentIndex];
        document.getElementById('progress-text').textContent = `Q ${currentIndex + 1} / ${currentQueue.length}`;
        document.getElementById('feedback-msg').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';

        if (currentMode === 'flashcard') {
            document.getElementById('flashcard-container').classList.remove('flipped');
            const front = document.getElementById('fc-front-content');
            const back = document.getElementById('fc-back-content');

            // ★ 修正ポイント：モードに合わせてクラス（表示形式）も入れ替える
            if (isReverseMode) {
                // 意味（説明文）から用語を答える
                front.textContent = data.desc;
                front.className = 'fc-medium'; // 説明文は標準サイズ
                back.textContent = data.term;
                back.className = 'fc-large';   // 答えの用語は大きく
            } else {
                // 用語から意味を答える
                front.textContent = data.term;
                front.className = 'fc-large';  // 用語は大きく
                back.textContent = data.desc;
                back.className = 'fc-medium'; // 答えの説明文は標準
            }
        } else {
            document.getElementById('question-text').textContent = isReverseMode ? data.term : data.desc;
            if (currentMode === 'choice') setupChoice(data);
            else setupInput();
        }
    }

    function flipCard() { document.getElementById('flashcard-container').classList.toggle('flipped'); }
    function markFlashcard(ok) { if(!ok) retryQueue.push(currentQueue[currentIndex]); currentIndex++; loadNext(); }

    function setupChoice(data) {
        const area = document.getElementById('options-area');
        area.innerHTML = '';
        const correct = isReverseMode ? data.desc : data.term;
        const choices = [{text: correct, correct: true}];
        let pool = quizData.filter(q => q.group === data.group && (isReverseMode ? q.desc : q.term) !== correct);
        if (pool.length < 3) pool = pool.concat(quizData.filter(q => q.group !== data.group));
        shuffle(pool).slice(0, 3).forEach(p => choices.push({text: isReverseMode ? p.desc : p.term, correct: false}));
        
        shuffle(choices).forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = c.text || "(なし)";
            btn.onclick = () => {
                document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
                const msg = document.getElementById('feedback-msg');
                msg.style.display = 'block';
                if (c.correct) {
                    btn.classList.add('correct');
                    msg.textContent = "正解！";
                    msg.className = 'feedback-msg correct';
                } else {
                    btn.classList.add('wrong');
                    msg.innerHTML = `正解: <strong>${correct}</strong>`;
                    msg.className = 'feedback-msg wrong';
                }
                document.getElementById('next-btn').style.display = 'inline-block';
            };
            area.appendChild(btn);
        });
    }

    function setupInput() {
        const input = document.getElementById('answer-input');
        input.value = ''; input.disabled = false; input.focus();
    }

    function checkInputAnswer() {
        const input = document.getElementById('answer-input');
        const correct = isReverseMode ? currentQueue[currentIndex].desc : currentQueue[currentIndex].term;
        const msg = document.getElementById('feedback-msg');
        input.disabled = true;
        msg.style.display = 'block';
        if (input.value.trim() === correct) {
            msg.textContent = "正解！"; msg.className = 'feedback-msg correct';
        } else {
            retryQueue.push(currentQueue[currentIndex]);
            msg.innerHTML = `正解: <strong>${correct}</strong>`; msg.className = 'feedback-msg wrong';
        }
        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function nextQuestion() { currentIndex++; loadNext(); }
    document.getElementById('answer-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') checkInputAnswer(); });
</script>
