<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公共 -学年末対策-</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --warning: #f59e0b;
            --error: #dc2626;
            --bg: #f3f4f6;
            --card: #ffffff;
            --text: #1f2937;
            --link: #7c3aed;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card);
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 680px;
            padding: 40px;
            text-align: center;
        }

        h1 { font-size: 1.6rem; margin-bottom: 5px; color: var(--primary); }
        .subtitle { font-size: 0.85rem; color: #6b7280; margin-bottom: 20px; }

        .range-selector {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
        }
        .range-selector h3 { font-size: 0.9rem; margin-top: 0; margin-bottom: 10px; color: #374151; }
        .checkbox-group { display: flex; flex-direction: column; gap: 8px; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; font-size: 0.95rem; cursor: pointer; }

        .mode-select { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .mode-btn {
            background-color: #fff; border: 2px solid var(--primary); color: var(--primary);
            padding: 12px; border-radius: 8px; font-size: 0.9rem; font-weight: bold; cursor: pointer; transition: 0.2s;
            text-decoration: none; display: flex; align-items: center; justify-content: center;
        }
        .mode-btn:hover { background-color: var(--primary); color: #fff; }

        .data-list-container {
            text-align: left;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
        }
        .data-table { width: 100%; border-collapse: collapse; background: white; }
        .data-table th, .data-table td { padding: 12px; border-bottom: 1px solid #e5e7eb; font-size: 0.85rem; }
        .data-table th { background: #f9fafb; position: sticky; top: 0; text-align: left; color: #4b5563; }
        .data-table tr:last-child td { border-bottom: none; }
        .term-cell { font-weight: bold; color: var(--primary); white-space: nowrap; }

        .link-btn { border-color: var(--link); color: var(--link); margin-top: 20px; width: 100%; }
        .link-btn:hover { background-color: var(--link); color: #fff; }

        .option-label { cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px; background: #eff6ff; border-radius: 20px; border: 1px solid #bfdbfe; margin-bottom: 20px; font-size: 0.85rem; }

        .screen { display: none; }
        .screen.active { display: block; }

        .progress { font-size: 0.85rem; color: #6b7280; margin-bottom: 15px; font-weight: bold; }
        .question-box { font-size: 1.05rem; font-weight: bold; margin-bottom: 25px; line-height: 1.6; min-height: 100px; display: flex; align-items: center; justify-content: center; background: #f9fafb; padding: 20px; border-radius: 8px; border: 1px solid #e5e7eb; }

        .fc-large { font-size: 1.6rem; font-weight: bold; color: var(--primary); }
        .fc-medium { font-size: 1.0rem; line-height: 1.6; color: var(--text); font-weight: normal; }

        .options-grid { display: grid; gap: 10px; grid-template-columns: 1fr; }
        button.option-btn { background: #fff; border: 2px solid #e5e7eb; border-radius: 8px; padding: 14px; font-size: 0.95rem; cursor: pointer; text-align: left; width: 100%; }
        button.option-btn.correct { background-color: #dcfce7; border-color: var(--success); color: var(--success); font-weight: bold; }
        button.option-btn.wrong { background-color: #fee2e2; border-color: var(--error); color: var(--error); }

        .input-area { display: flex; flex-direction: column; gap: 15px; }
        input[type="text"] { padding: 15px; font-size: 1.2rem; border: 2px solid #e5e7eb; border-radius: 8px; text-align: center; width: 100%; box-sizing: border-box; }
        .submit-btn { background-color: var(--primary); color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .flashcard-container { width: 100%; height: 260px; perspective: 1000px; cursor: pointer; margin-bottom: 20px; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0s; }
        .flashcard-container.flipped .flashcard-inner { transform: rotateY(180deg); }
        .flashcard-front, .flashcard-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 12px; padding: 25px; box-sizing: border-box; border: 2px solid #e5e7eb; }
        .flashcard-front { background-color: #fff; }
        .flashcard-back { background-color: #f0fdf4; transform: rotateY(180deg); border-color: var(--success); }

        .fc-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .fc-btn { padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; }
        .fc-btn-ok { background-color: var(--success); }
        .fc-btn-ng { background-color: #ef4444; }

        .feedback-msg { margin-top: 15px; padding: 15px; border-radius: 8px; font-weight: bold; display: none; }
        .feedback-msg.correct { background-color: #dcfce7; color: var(--success); }
        .feedback-msg.wrong { background-color: #fee2e2; color: var(--error); }
        .next-btn { background-color: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen" class="screen active">
        <h1>公共 重要用語マスター</h1>
        <p class="subtitle">学年末 (3/5, 14:44更新)</p>

        <div class="range-selector">
            <h3>出題範囲を選択：</h3>
            <div class="checkbox-group">
                <label class="checkbox-item"><input type="checkbox" class="range-chk" value="小テスト" checked> 小テスト</label>
                <label class="checkbox-item"><input type="checkbox" class="range-chk" value="順当マイノート" checked> 順当マイノート</label>
                <label class="checkbox-item"><input type="checkbox" class="range-chk" value="重箱の隅をほじくる" checked> 重箱の隅をほじくる</label>
                <label class="checkbox-item"><input type="checkbox" class="range-chk" value="共通テスト" checked> 共通テスト</label>
            </div>
        </div>

        <label class="option-label">
            <input type="checkbox" id="reverse-mode-chk"> 🔄 意味から用語を答える
        </label>
        
        <div class="mode-select">
            <button class="mode-btn" onclick="startGame('flashcard')">カード</button>
            <button class="mode-btn" onclick="startGame('choice')">4択</button>
            <button class="mode-btn" onclick="startGame('input')">記述</button>
            <button class="mode-btn" onclick="showDataList()">データ一覧</button>
        </div>

        <a href="https://sithigh21147.github.io/chemoti/" class="mode-btn link-btn">化学はこちら</a>
    </div>

    <div id="data-screen" class="screen">
        <h1>収録データ一覧</h1>
        <div class="data-list-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>カテゴリ</th>
                        <th>用語</th>
                        <th>説明</th>
                    </tr>
                </thead>
                <tbody id="data-list-body"></tbody>
            </table>
        </div>
        <button class="next-btn" onclick="location.reload()">戻る</button>
    </div>

    <div id="main-screen" class="screen">
        <div class="progress" id="progress-text"></div>
        <div id="question-area"><div class="question-box" id="question-text"></div></div>

        <div id="flashcard-area" style="display:none;">
            <div class="flashcard-container" id="flashcard-container" onclick="flipCard()">
                <div class="flashcard-inner">
                    <div class="flashcard-front"><div id="fc-front-content"></div></div>
                    <div class="flashcard-back"><div id="fc-back-content"></div></div>
                </div>
            </div>
            <div class="fc-controls">
                <button class="fc-btn fc-btn-ng" onclick="markFlashcard(false)">× 苦手</button>
                <button class="fc-btn fc-btn-ok" onclick="markFlashcard(true)">○ 覚えた</button>
            </div>
        </div>

        <div id="options-area" class="options-grid" style="display:none;"></div>
        <div id="input-area" class="input-area" style="display:none;">
            <input type="text" id="answer-input" placeholder="解答を入力" autocomplete="off">
            <button class="submit-btn" onclick="checkInputAnswer()">回答</button>
        </div>

        <div id="feedback-msg" class="feedback-msg"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()" style="display:none">次へ</button>
    </div>

    <div id="result-screen" class="screen">
        <h1>全問終了！</h1>
        <p>学習お疲れ様でした。</p>
        <button class="next-btn" onclick="location.reload()">トップに戻る</button>
    </div>
</div>

<script>
    const quizData = [
        /* === 共通テスト (新規追加) === */
        { cat: "共通テスト", group: "G", term: "形式的平等", desc: "個性や属性にかかわらず、すべての人を同じように扱う「機会の平等」。" },
        { cat: "共通テスト", group: "G", term: "実質的平等", desc: "一人ひとりの異なる事情を考慮し、現実的に平等な結果となるよう取り扱う「結果の平等」。" },
        { cat: "共通テスト", group: "F", term: "第14条", desc: "日本国憲法で法の下の平等を明記する条文。「第n条」" },
        { cat: "共通テスト", group: "G", term: "アイヌ民族支援法", desc: "2019年に成立・施行された、アイヌ民族を「先住民族」と明記した法律。" },
        { cat: "共通テスト", group: "D", term: "参議院", desc: "投票価値の平等を実現する施策である「合区」を選挙に採用した議院。" },
        { cat: "共通テスト", group: "H", term: "減反政策", desc: "戦後の日本における米の生産調整を行うための農業政策。" },
        { cat: "共通テスト", group: "C", term: "損失補償", desc: "公共の福祉のために個人の財産を強制的に収容した場合、国や自治体が補償する制度。" },
        { cat: "共通テスト", group: "B", term: "岸信介", desc: "日米安保条約にアメリカの日本防衛義務が明記され「事前協議制」を設ける改定を行った総理大臣。" },
        { cat: "共通テスト", group: "B", term: "佐藤栄作", desc: "国会の決議である非核三原則を表明した時の総理大臣。" },
        { cat: "共通テスト", group: "B", term: "防衛装備移転三原則", desc: "武器輸出三原則を見直し、一定の条件で防衛装備品の輸出を認めるもの。" },
        { cat: "共通テスト", group: "B", term: "資金援助のみ", desc: "PKO協力法の成立契機となった「湾岸戦争」にて、日本が行ったこと。" },
        { cat: "共通テスト", group: "B", term: "限定的", desc: "2015年の平和安全法制で容認された集団的自衛権の程度。「○○的」" },
        { cat: "共通テスト", group: "B", term: "武力行使の「新三要件」", desc: "「存立危機事態」「他に適当な手段がない」「必要最小限度の実力行使」の総称。" },
        { cat: "共通テスト", group: "B", term: "国際平和支援法", desc: "期限付きの「特措法」を作らずに自衛隊が後方支援に参加できるようになった恒久法。" },

        /* ダミー追加用 (共通テスト) */
        { cat: "共通テスト", group: "G", term: "絶対的平等", isDistractor: true },
        { cat: "共通テスト", group: "G", term: "アイヌ文化振興法", isDistractor: true },
        { cat: "共通テスト", group: "H", term: "食糧管理制度", isDistractor: true },
        { cat: "共通テスト", group: "H", term: "農業基本法", isDistractor: true },
        { cat: "共通テスト", group: "B", term: "池田勇人", isDistractor: true },
        { cat: "共通テスト", group: "B", term: "田中角栄", isDistractor: true },

        /* === 小テスト === */
        { cat: "小テスト", group: "A", term: "警察予備隊", desc: "1950年に朝鮮戦争の勃発をきっかけに設けられた部隊。" },
        { cat: "小テスト", group: "B", term: "日米防衛協力のための指針", desc: "1978年に制定された「ガイドライン」、またの名を:" },
        { cat: "小テスト", group: "B", term: "非核三原則", desc: "核兵器をもたず、つくらず、もちこませず" },
        { cat: "小テスト", group: "C", term: "最高機関", desc: "国会は、国権の○○○○であつて、(憲法第41条)" },
        { cat: "小テスト", group: "C", term: "両院協議会", desc: "衆議院と参議院で異なる議決をした場合に開くことができる。" },
        { cat: "小テスト", group: "D", term: "小選挙区比例代表並立制", desc: "現在の衆議院選挙の制度。" },
        { cat: "小テスト", group: "F", term: "ドント式", desc: "得票数を自然数で割り、商の大きい順に議席を割り振る方式。" },
        { cat: "小テスト", group: "F", term: "アダムズ式", desc: "人口を一定数で割り切り上げて定数を算出する方式。" },

        /* === 順当マイノート === */
        { cat: "順当マイノート", group: "A", term: "自衛隊", desc: "1954年、米国との相互防衛援助協定(MSA協定)が背景で発足。" },
        { cat: "順当マイノート", group: "A", term: "文民統制の原則", desc: "国防上の重要事項の決定権は職業軍人でないものが持つこと。" },
        { cat: "順当マイノート", group: "B", term: "日米地位協定", desc: "在日米軍基地や米軍人の法的地位を定めた協定。" },
        { cat: "順当マイノート", group: "B", term: "思いやり予算", desc: "在日米軍駐留経費の一部を日本が負担する制度。" },
        { cat: "順当マイノート", group: "B", term: "PKO協力法", desc: "カンボジアをはじめ、世界各地へ自衛隊が派遣されるようにした法律。" },
        { cat: "順当マイノート", group: "C", term: "地方分権一括法", desc: "機関委任事務を廃止した法律。" },

        /* === 重箱の隅をほじくる === */
        { cat: "重箱の隅をほじくる", group: "F", term: "過半数", desc: "国務大臣の国会議員が占めなければならない割合。" },
        { cat: "重箱の隅をほじくる", group: "F", term: "3分の2", desc: "衆議院で否決された法律案を再可決するのに必要な出席議員の割合。" },
        { cat: "重箱の隅をほじくる", group: "F", term: "7割", desc: "地方自治体の歳入のうち、国への依存財源がおよそ何割と言われるか。" },

        /* 既存ダミー */
        { group: "A", term: "特別警備隊", isDistractor: true }, { group: "A", term: "近衛兵", isDistractor: true },
        { group: "B", term: "平和維持条約", isDistractor: true }, { group: "B", term: "国際平和維持軍", isDistractor: true },
        { group: "C", term: "内閣総理協議会", isDistractor: true }, { group: "C", term: "住民自治法", isDistractor: true },
        { group: "D", term: "中選挙区制", isDistractor: true }, { group: "D", term: "大選挙区制", isDistractor: true }
    ];

    let currentQueue = [];
    let retryQueue = [];
    let currentIndex = 0;
    let currentMode = 'choice';
    let isReverseMode = false;

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function showDataList() {
        const body = document.getElementById('data-list-body');
        body.innerHTML = '';
        const listData = quizData.filter(q => q.desc);
        listData.forEach(q => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${q.cat}</td><td class="term-cell">${q.term}</td><td>${q.desc}</td>`;
            body.appendChild(tr);
        });
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('data-screen').classList.add('active');
    }

    function startGame(mode) {
        currentMode = mode;
        isReverseMode = document.getElementById('reverse-mode-chk').checked;
        const selectedCats = Array.from(document.querySelectorAll('.range-chk:checked')).map(cb => cb.value);
        if (selectedCats.length === 0) { alert("出題範囲を選んでください"); return; }

        const tasks = quizData.filter(q => {
            if (!q.desc || !selectedCats.includes(q.cat)) return false;
            if (q.group === 'F' && !isReverseMode) return false;
            return true;
        });

        if (tasks.length === 0) { alert("出題できる問題がありません"); return; }

        currentQueue = shuffle([...tasks]);
        currentIndex = 0;
        retryQueue = [];
        
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('main-screen').classList.add('active');
        updateUI();
        loadNext();
    }

    function updateUI() {
        document.getElementById('question-area').style.display = (currentMode === 'flashcard') ? 'none' : 'block';
        document.getElementById('flashcard-area').style.display = (currentMode === 'flashcard') ? 'block' : 'none';
        document.getElementById('options-area').style.display = (currentMode === 'choice') ? 'grid' : 'none';
        document.getElementById('input-area').style.display = (currentMode === 'input') ? 'flex' : 'none';
    }

    function loadNext() {
        if (currentIndex >= currentQueue.length) {
            if (retryQueue.length > 0 && currentMode !== 'choice') {
                currentQueue = shuffle([...retryQueue]);
                retryQueue = []; currentIndex = 0;
                alert("間違えた問題のリトライを開始します！");
            } else {
                document.getElementById('main-screen').classList.remove('active');
                document.getElementById('result-screen').classList.add('active');
                return;
            }
        }

        const data = currentQueue[currentIndex];
        document.getElementById('progress-text').textContent = `Q ${currentIndex + 1} / ${currentQueue.length}`;
        document.getElementById('feedback-msg').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';

        if (currentMode === 'flashcard') {
            document.getElementById('flashcard-container').classList.remove('flipped');
            const front = document.getElementById('fc-front-content');
            const back = document.getElementById('fc-back-content');
            if (isReverseMode) {
                front.textContent = data.desc; front.className = 'fc-medium';
                back.textContent = data.term; back.className = 'fc-large';
            } else {
                front.textContent = data.term; front.className = 'fc-large';
                back.textContent = data.desc; back.className = 'fc-medium';
            }
        } else {
            document.getElementById('question-text').textContent = isReverseMode ? data.desc : data.term;
            if (currentMode === 'choice') setupChoice(data);
            else setupInput();
        }
    }

    function flipCard() { document.getElementById('flashcard-container').classList.toggle('flipped'); }
    function markFlashcard(ok) { if(!ok) retryQueue.push(currentQueue[currentIndex]); currentIndex++; loadNext(); }

    function setupChoice(data) {
        const area = document.getElementById('options-area');
        area.innerHTML = '';
        const correctText = isReverseMode ? data.term : data.desc;
        const choices = [{text: correctText, correct: true}];
        
        // グループ分けを考慮したダミー選択肢の抽出
        let pool = quizData.filter(q => 
            q.group === data.group && 
            (isReverseMode ? q.term : q.desc) && 
            (isReverseMode ? q.term : q.desc) !== correctText
        );

        // 同じグループが足りない場合は他から補充
        if (pool.length < 3) {
            let extra = quizData.filter(q => 
                (isReverseMode ? q.term : q.desc) && 
                (isReverseMode ? q.term : q.desc) !== correctText &&
                !pool.includes(q)
            );
            pool = pool.concat(shuffle(extra));
        }
        
        shuffle(pool).slice(0, 3).forEach(p => {
            choices.push({text: isReverseMode ? p.term : p.desc, correct: false});
        });
        
        shuffle(choices).forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = c.text;
            btn.onclick = () => {
                document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
                const msg = document.getElementById('feedback-msg');
                msg.style.display = 'block';
                if (c.correct) {
                    btn.classList.add('correct');
                    msg.textContent = "正解！"; msg.className = 'feedback-msg correct';
                } else {
                    btn.classList.add('wrong');
                    msg.innerHTML = `正解: <strong>${correctText}</strong>`; msg.className = 'feedback-msg wrong';
                    retryQueue.push(data);
                }
                document.getElementById('next-btn').style.display = 'inline-block';
            };
            area.appendChild(btn);
        });
    }

    function setupInput() {
        const input = document.getElementById('answer-input');
        input.value = ''; input.disabled = false; input.focus();
    }

    function checkInputAnswer() {
        const input = document.getElementById('answer-input');
        const correct = isReverseMode ? currentQueue[currentIndex].term : currentQueue[currentIndex].desc;
        const msg = document.getElementById('feedback-msg');
        input.disabled = true;
        msg.style.display = 'block';
        if (input.value.trim() === correct) {
            msg.textContent = "正解！"; msg.className = 'feedback-msg correct';
        } else {
            retryQueue.push(currentQueue[currentIndex]);
            msg.innerHTML = `正解: <strong>${correct}</strong>`; msg.className = 'feedback-msg wrong';
        }
        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function nextQuestion() { currentIndex++; loadNext(); }
    document.getElementById('answer-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') checkInputAnswer(); });
</script>
</body>
</html>
