<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公共 重要用語マスター（高度細分化版）</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --warning: #f59e0b;
            --error: #dc2626;
            --bg: #f3f4f6;
            --card: #ffffff;
            --text: #1f2937;
            --link: #7c3aed; /* 化学ボタン用の紫 */
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card);
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 640px;
            padding: 40px;
            text-align: center;
            position: relative;
        }

        h1 { font-size: 1.6rem; margin-bottom: 10px; color: var(--primary); }
        .subtitle { font-size: 0.85rem; color: #6b7280; margin-bottom: 25px; }

        .mode-select { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .mode-btn {
            background-color: #fff; border: 2px solid var(--primary); color: var(--primary);
            padding: 14px; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s;
            text-decoration: none; display: block;
        }
        .mode-btn:hover { background-color: var(--primary); color: #fff; }

        /* 化学ボタン用スタイル */
        .link-btn {
            border-color: var(--link);
            color: var(--link);
            margin-top: 10px;
        }
        .link-btn:hover {
            background-color: var(--link);
            color: #fff;
        }

        .external-area {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }

        .option-label { cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px; background: #eff6ff; border-radius: 20px; border: 1px solid #bfdbfe; margin-bottom: 20px; font-size: 0.9rem; }

        .screen { display: none; }
        .screen.active { display: block; }

        .progress { font-size: 0.85rem; color: #6b7280; margin-bottom: 15px; font-weight: bold; }
        .question-box { font-size: 1.1rem; font-weight: bold; margin-bottom: 25px; line-height: 1.6; min-height: 100px; display: flex; align-items: center; justify-content: center; background: #f9fafb; padding: 20px; border-radius: 8px; border: 1px solid #e5e7eb; }

        .options-grid { display: grid; gap: 10px; grid-template-columns: 1fr; }
        button.option-btn { background: #fff; border: 2px solid #e5e7eb; border-radius: 8px; padding: 14px; font-size: 0.95rem; cursor: pointer; text-align: left; width: 100%; }
        button.option-btn.correct { background-color: #dcfce7; border-color: var(--success); color: var(--success); font-weight: bold; }
        button.option-btn.wrong { background-color: #fee2e2; border-color: var(--error); color: var(--error); }

        .input-area { display: flex; flex-direction: column; gap: 15px; }
        input[type="text"] { padding: 15px; font-size: 1.2rem; border: 2px solid #e5e7eb; border-radius: 8px; text-align: center; width: 100%; box-sizing: border-box; }
        .submit-btn { background-color: var(--primary); color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .flashcard-container { width: 100%; height: 260px; perspective: 1000px; cursor: pointer; margin-bottom: 20px; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0s; }
        .flashcard-container.flipped .flashcard-inner { transform: rotateY(180deg); }
        .flashcard-front, .flashcard-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 12px; padding: 20px; box-sizing: border-box; border: 2px solid #e5e7eb; }
        .flashcard-front { background-color: #fff; color: var(--primary); }
        .flashcard-back { background-color: #f0fdf4; transform: rotateY(180deg); border-color: var(--success); }
        .fc-large { font-size: 1.6rem; font-weight: bold; }
        .fc-medium { font-size: 1rem; line-height: 1.5; }

        .fc-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .fc-btn { padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; }
        .fc-btn-ok { background-color: var(--success); }
        .fc-btn-ng { background-color: #ef4444; }

        .feedback-msg { margin-top: 15px; padding: 15px; border-radius: 8px; font-weight: bold; display: none; }
        .feedback-msg.correct { background-color: #dcfce7; color: var(--success); }
        .feedback-msg.wrong { background-color: #fee2e2; color: var(--error); }
        .next-btn { background-color: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen" class="screen active">
        <h1>公共 重要用語マスター</h1>
        <p class="subtitle">統治・防衛・行政の専門分野別（細分化版）</p>

        <label class="option-label">
            <input type="checkbox" id="reverse-mode-chk"> 🔄 意味から用語を答える
        </label>
        
        <div class="mode-select">
            <button class="mode-btn" onclick="startGame('flashcard')">フラッシュカード</button>
            <button class="mode-btn" onclick="startGame('choice')">4択クイズ</button>
            <button class="mode-btn" onclick="startGame('input')">記述チャレンジ</button>
        </div>

        <div class="external-area">
            <a href="https://sithigh21147.github.io/chemoti/" class="mode-btn link-btn">化学はこちら</a>
        </div>
    </div>

    <div id="main-screen" class="screen">
        <div class="progress" id="progress-text"></div>
        <div id="question-area"><div class="question-box" id="question-text"></div></div>

        <div id="flashcard-area" style="display:none;">
            <div class="flashcard-container" id="flashcard-container" onclick="flipCard()">
                <div class="flashcard-inner">
                    <div class="flashcard-front"><div id="fc-front-content" class="fc-large"></div></div>
                    <div class="flashcard-back"><div id="fc-back-content" class="fc-medium"></div></div>
                </div>
            </div>
            <div class="fc-controls">
                <button class="fc-btn fc-btn-ng" onclick="markFlashcard(false)">× 苦手</button>
                <button class="fc-btn fc-btn-ok" onclick="markFlashcard(true)">○ 覚えた</button>
            </div>
        </div>

        <div id="options-area" class="options-grid" style="display:none;"></div>

        <div id="input-area" class="input-area" style="display:none;">
            <input type="text" id="answer-input" placeholder="解答を入力" autocomplete="off">
            <button class="submit-btn" onclick="checkInputAnswer()">回答</button>
        </div>

        <div id="feedback-msg" class="feedback-msg"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()" style="display:none">次へ</button>
    </div>

    <div id="result-screen" class="screen">
        <h1>全問終了！</h1>
        <p>お疲れ様でした。</p>
        <button class="next-btn" onclick="location.reload()">トップに戻る</button>
    </div>
</div>

<script>
    const quizData = [
        /* A: 防衛・自衛隊 */
        { group: "A", term: "警察予備隊", desc: "1950年に朝鮮戦争の勃発をきっかけに設けられた部隊。" },
        { group: "A", term: "保安隊", isDistractor: true },
        { group: "A", term: "自衛隊", isDistractor: true },

        /* B1: 安全保障・日米関係 */
        { group: "B1", term: "日米防衛協力のための指針", desc: "1978年に制定された「ガイドライン」、またの名を:" },
        { group: "B1", term: "非核三原則", desc: "核兵器をもたず、つくらず、もちこませず" },
        { group: "B1", term: "日米安保共同宣言", desc: "アジア太平洋地域に於いて日米安保体制を再定義した宣言。" },
        { group: "B1", term: "重要影響事態法", desc: "周辺事態法を改正して生まれた法律。" },
        { group: "B1", term: "集団的自衛権", desc: "2014年までは自衛のための最小限度の実力行使として認められなかった権利。" },
        { group: "B1", term: "自衛のための必要最小限度の実力", desc: "現在の政府の自衛隊に対する見解。" },

        /* B2: 政党・選挙原則 */
        { group: "B2", term: "綱領", desc: "政党が国民の意見や要求をくみ上げてまとめるもの。" },
        { group: "B2", term: "政党助成法", desc: "政党の活動費を国庫から補助する法律。" },
        { group: "B2", term: "平等選挙", desc: "一人ひとりの投票の価値を平等に扱うこと。" },
        { group: "B2", term: "政治資金規正法", desc: "政治資金の透明性確保を目的とする法律。" },

        /* C1: 行政・官僚の仕組み */
        { group: "C1", term: "最高機関", desc: "国会は、国権の○○○○であつて、(憲法第41条)" },
        { group: "C1", term: "立法機関", desc: "国会は、国の唯一の○○○○である" },
        { group: "C1", term: "両院協議会", desc: "衆議院と参議院で異なる議決をした場合に開くことができる。" },
        { group: "C1", term: "委任立法", desc: "国会が行うべき立法を行政機関に任せてしまうこと。" },
        { group: "C1", term: "許認可権", desc: "行政指導と合わせて企業や業界を保護・統制するのに使う権限。" },
        { group: "C1", term: "行政委員会", desc: "独立して職権を行使する合議制の決定機関。" },
        { group: "C1", term: "官僚主義", desc: "公務員における権威主義や形式主義、縄張り意識。" },
        { group: "C1", term: "官僚政治", desc: "政策決定で官僚が中心的役割を果たすこと。" },
        { group: "C1", term: "党議拘束", desc: "政党に所属する議員は政党の決定に従う必要がある。" },

        /* C2: 司法制度・裁判 */
        { group: "C2", term: "国民審査", desc: "最高裁判所裁判官について、衆議院選挙と同時に開催されるもの。" },
        { group: "C2", term: "弾劾裁判所", desc: "国会に設置する、訴追された裁判官をやめさせるもの。" },
        { group: "C2", term: "起訴議決制度", desc: "検察審査会で起訴相当と判断した場合、弁護士が被疑者を起訴する制度。" },
        { group: "C2", term: "統治行為論", desc: "高度に政治的な事件には裁判所の違憲審査権が及ばないとする考え方。" },
        { group: "C2", term: "訴追", desc: "犯罪かどうかにかかわらず、国民の信託に違反する行為を行うこと（罷免を求めて裁判にかけること）。" },

        /* C3: 地方自治 */
        { group: "C3", term: "地方自治の本旨", desc: "住民自治と団体自治を保障する原則。" },
        { group: "C3", term: "三位一体改革", desc: "地方分権と財政再建を目指した、税源移譲・補助金削減・交付金見直しの改革。" },
        { group: "C3", term: "イニシアティブ", desc: "条例の制定・改廃請求権をカタカナで言うと。" },

        /* D & E: 選挙制度・計算 */
        { group: "D", term: "小選挙区比例代表並立制", desc: "現在の衆議院選挙の制度。" },
        { group: "D", term: "中選挙区制", isDistractor: true },
        { group: "E", term: "ドント式", desc: "得票数を1, 2, 3...と自然数で割り、商の大きい順に議議席を割り振る方式。" },
        { group: "E", term: "アダムズ式", desc: "人口を一定数で割り、端数を切り上げて定数を算出する方式。" },
        { group: "E", term: "ボルダ式", isDistractor: true }
    ];

    let currentQueue = [];
    let retryQueue = [];
    let currentIndex = 0;
    let currentMode = 'choice';
    let isReverseMode = false;

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function startGame(mode) {
        currentMode = mode;
        isReverseMode = document.getElementById('reverse-mode-chk').checked;
        const mainTasks = quizData.filter(q => q.desc);
        currentQueue = shuffle([...mainTasks]);
        currentIndex = 0;
        retryQueue = [];
        
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('main-screen').classList.add('active');
        updateUI();
        loadNext();
    }

    function updateUI() {
        document.getElementById('question-area').style.display = (currentMode === 'flashcard') ? 'none' : 'block';
        document.getElementById('flashcard-area').style.display = (currentMode === 'flashcard') ? 'block' : 'none';
        document.getElementById('options-area').style.display = (currentMode === 'choice') ? 'grid' : 'none';
        document.getElementById('input-area').style.display = (currentMode === 'input') ? 'flex' : 'none';
    }

    function loadNext() {
        if (currentIndex >= currentQueue.length) {
            if (retryQueue.length > 0 && currentMode !== 'choice') {
                currentQueue = shuffle([...retryQueue]);
                retryQueue = [];
                currentIndex = 0;
                alert("間違えた問題を再挑戦します！");
            } else {
                document.getElementById('main-screen').classList.remove('active');
                document.getElementById('result-screen').classList.add('active');
                return;
            }
        }

        const data = currentQueue[currentIndex];
        document.getElementById('progress-text').textContent = `Q ${currentIndex + 1} / ${currentQueue.length}`;
        document.getElementById('feedback-msg').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';

        if (currentMode === 'flashcard') {
            document.getElementById('flashcard-container').classList.remove('flipped');
            document.getElementById('fc-front-content').textContent = isReverseMode ? data.desc : data.term;
            document.getElementById('fc-back-content').textContent = isReverseMode ? data.term : data.desc;
        } else {
            document.getElementById('question-text').textContent = isReverseMode ? data.term : data.desc;
            if (currentMode === 'choice') setupChoice(data);
            else setupInput();
        }
    }

    function flipCard() { document.getElementById('flashcard-container').classList.toggle('flipped'); }
    function markFlashcard(ok) { if(!ok) retryQueue.push(currentQueue[currentIndex]); currentIndex++; loadNext(); }

    function setupChoice(data) {
        const area = document.getElementById('options-area');
        area.innerHTML = '';
        const correct = isReverseMode ? data.desc : data.term;
        const choices = [{text: correct, correct: true}];
        
        let pool = quizData.filter(q => q.group === data.group && (isReverseMode ? q.desc : q.term) !== correct);
        if (pool.length < 3) pool = pool.concat(quizData.filter(q => q.group !== data.group));
        
        shuffle(pool).slice(0, 3).forEach(p => choices.push({text: isReverseMode ? p.desc : p.term, correct: false}));
        
        shuffle(choices).forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = c.text || "(用語のみ)";
            btn.onclick = () => {
                document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
                const msg = document.getElementById('feedback-msg');
                msg.style.display = 'block';
                if (c.correct) {
                    btn.classList.add('correct');
                    msg.textContent = "正解！";
                    msg.className = 'feedback-msg correct';
                } else {
                    btn.classList.add('wrong');
                    msg.innerHTML = `残念！ 正解は: <strong>${correct}</strong>`;
                    msg.className = 'feedback-msg wrong';
                }
                document.getElementById('next-btn').style.display = 'inline-block';
            };
            area.appendChild(btn);
        });
    }

    function setupInput() {
        const input = document.getElementById('answer-input');
        input.value = ''; input.disabled = false; input.focus();
    }

    function checkInputAnswer() {
        const input = document.getElementById('answer-input');
        const correct = isReverseMode ? currentQueue[currentIndex].desc : currentQueue[currentIndex].term;
        const msg = document.getElementById('feedback-msg');
        input.disabled = true;
        msg.style.display = 'block';

        if (input.value.trim() === correct) {
            msg.textContent = "正解です！";
            msg.className = 'feedback-msg correct';
        } else {
            retryQueue.push(currentQueue[currentIndex]);
            msg.innerHTML = `正解は: <strong>${correct}</strong>`;
            msg.className = 'feedback-msg wrong';
        }
        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function nextQuestion() { currentIndex++; loadNext(); }
    document.getElementById('answer-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') checkInputAnswer(); });
</script>
</body>
</html>
